<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Maps Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.75rem;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 720px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #1e293b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .grid .full { grid-column: 1 / -1; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select, textarea {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: #6366f1; }
    textarea { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.8rem; resize: vertical; }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #btn-run   { background: #6366f1; color: #fff; }
    #btn-run:not(:disabled):hover   { background: #4f46e5; }
    #btn-clear { background: #2d3148; color: #94a3b8; }
    #btn-clear:hover { background: #374162; }
    #btn-dl    { background: #10b981; color: #fff; display: none; }
    #btn-dl:hover { background: #059669; }
    #btn-stop  { background: #7f1d1d; color: #fca5a5; display: none; }
    #btn-stop:not(:disabled):hover { background: #991b1b; }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
      display: none;
    }
    .status-badge.running  { background: #1e3a5f; color: #60a5fa; display: inline-block; }
    .status-badge.done     { background: #064e3b; color: #34d399; display: inline-block; }
    .status-badge.error    { background: #4c1d1d; color: #f87171; display: inline-block; }
    .status-badge.stopped  { background: #451a03; color: #fdba74; display: inline-block; }
    .status-badge.partial  { background: #451a03; color: #f59e0b; display: inline-block; }

    /* Stats bar */
    .stats-bar {
      display: none;
      margin-top: 1.1rem;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .stats-bar.visible { display: grid; }
    .stat {
      background: #161926;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      display: block;
    }
    .stat-label {
      font-size: 0.65rem;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .log-wrapper {
      margin-top: 1.25rem;
      background: #0a0c12;
      border: 1px solid #1e2130;
      border-radius: 10px;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.85rem;
      background: #111827;
      border-bottom: 1px solid #1e2130;
      font-size: 0.75rem;
      color: #6b7280;
    }

    #log {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      padding: 0.85rem 1rem;
      height: 380px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .line { padding: 1px 0; }
    .line.INFO    { color: #94a3b8; }
    .line.WARNING { color: #f59e0b; }
    .line.ERROR   { color: #f87171; }
    .line.DEBUG   { color: #64748b; }
    .line.ZONE    { color: #818cf8; font-weight: 600; }
    .line.SUCCESS { color: #34d399; font-weight: 600; }

    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Google Maps Scraper</h1>

  <div class="card">
    <form id="form">
      <div class="section-title">Búsqueda</div>
      <div class="grid">
        <label>
          Comunidad autónoma
          <select name="comunidad" id="comunidad">
            <option value="">— Buscar por ciudad —</option>
          </select>
        </label>
        <label>
          Población mínima municipio
          <input type="number" name="min_poblacion" id="min_poblacion" value="5000" min="0" step="1000" disabled />
        </label>
        <label class="full" id="label-city">
          Ciudad
          <input type="text" name="city" id="city" value="Santiago de Compostela, España" required />
        </label>
        <label class="full">
          Categoría
          <input type="text" name="category" value="tiendas de ropa" required />
        </label>
        <label>
          Máx. resultados <small style="text-transform:none;font-size:0.7rem">(0 = todos)</small>
          <input type="number" name="max_results" value="0" min="0" />
        </label>
        <label>
          Headless
          <select name="headless">
            <option value="true" selected>Sí</option>
            <option value="false">No (visible)</option>
          </select>
        </label>
        <label>
          Delay scroll (ms)
          <input type="number" name="slow_ms" value="250" min="0" />
        </label>
        <label>
          Timeout página (ms)
          <input type="number" name="timeout_ms" value="15000" min="1000" />
        </label>
        <label>
          Concurrencia
          <input type="number" name="concurrency" value="3" min="1" max="10" />
        </label>
        <label class="full" style="flex-direction:row; align-items:center; gap:0.6rem; cursor:pointer;">
          <input type="checkbox" name="adaptive_subdivision" value="true" checked
                 style="width:auto; accent-color:#6366f1; width:1rem; height:1rem;" />
          <span>Subdivisión adaptativa</span>
          <small style="color:#4b5563; text-transform:none; font-weight:400; font-size:0.75rem; margin-left:0.25rem">
            (subdivide sectores con alta densidad recursivamente)
          </small>
        </label>
      </div>

      <div class="actions">
        <button type="submit" id="btn-run">▶ Ejecutar</button>
        <button type="button" id="btn-stop">■ Detener</button>
        <button type="button" id="btn-clear">Limpiar log</button>
        <button type="button" id="btn-dl">↓ Descargar CSV</button>
        <span class="status-badge" id="badge"></span>
      </div>
    </form>

    <!-- Métricas en tiempo real -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-discovered">–</span>
        <span class="stat-label">Descubiertos</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-processed">–</span>
        <span class="stat-label">Procesados</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-valid">–</span>
        <span class="stat-label">Válidos</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-errors">–</span>
        <span class="stat-label">Errores</span>
      </div>
    </div>

    <div class="log-wrapper">
      <div class="log-header">
        <span>Salida</span>
        <span id="line-count">0 líneas</span>
      </div>
      <div id="log"></div>
    </div>
  </div>

  <div class="card" id="history-card" style="display:none; margin-top:1.5rem; max-width:720px; width:100%;">
    <div class="section-title">Historial de ejecuciones</div>
    <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
      <thead>
        <tr style="color:#4b5563; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em;">
          <th style="text-align:left; padding:0.4rem 0.5rem; font-weight:600;">Hora</th>
          <th style="text-align:left; padding:0.4rem 0.5rem; font-weight:600;">Ciudad</th>
          <th style="text-align:left; padding:0.4rem 0.5rem; font-weight:600;">Categoría</th>
          <th style="text-align:left; padding:0.4rem 0.5rem; font-weight:600;">Estado</th>
          <th style="text-align:right; padding:0.4rem 0.5rem; font-weight:600;">Válidos</th>
          <th style="text-align:center; padding:0.4rem 0.5rem; font-weight:600;">Acciones</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>

  <script>
    // ── Form & log ──
    const form      = document.getElementById('form');
    const btnRun    = document.getElementById('btn-run');
    const btnStop   = document.getElementById('btn-stop');
    const btnClear  = document.getElementById('btn-clear');
    const btnDl     = document.getElementById('btn-dl');
    const badge     = document.getElementById('badge');
    const logEl     = document.getElementById('log');
    const lineCount = document.getElementById('line-count');
    const statsBar  = document.getElementById('stats-bar');

    // Stat cells
    const statDiscovered = document.getElementById('stat-discovered');
    const statProcessed  = document.getElementById('stat-processed');
    const statValid      = document.getElementById('stat-valid');
    const statErrors     = document.getElementById('stat-errors');

    let lineNum = 0;
    let es = null;
    let currentJobId = null;

    // ── Selector de comunidad ──
    const comunidadSel = document.getElementById('comunidad');
    const minPobInput  = document.getElementById('min_poblacion');
    const cityInput    = document.getElementById('city');
    const cityLabel    = document.getElementById('label-city');

    fetch('/comunidades')
      .then(r => r.json())
      .then(d => {
        for (const c of (d.comunidades || [])) {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          comunidadSel.appendChild(opt);
        }
      })
      .catch(() => { /* endpoint puede no existir aún */ });

    function applyComunidadMode() {
      const isComunidad = comunidadSel.value !== '';
      minPobInput.disabled = !isComunidad;
      cityInput.disabled   = isComunidad;
      cityInput.required   = !isComunidad;
      cityLabel.style.opacity = isComunidad ? '0.4' : '1';
      if (isComunidad) {
        cityInput.dataset.prev = cityInput.value;
        cityInput.value = '';
      } else if (cityInput.dataset.prev) {
        cityInput.value = cityInput.dataset.prev;
      }
    }

    comunidadSel.addEventListener('change', applyComunidadMode);

    const historyCard = document.getElementById('history-card');
    const historyBody = document.getElementById('history-body');
    const isLocal = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
    let currentHistoryRow = null;

    function levelOf(text) {
      if (text.includes('| ERROR |'))   return 'ERROR';
      if (text.includes('| WARNING |')) return 'WARNING';
      if (text.includes('| DEBUG |'))   return 'DEBUG';
      if (text.includes('──')) return 'ZONE';
      if (text.includes('✓ '))          return 'SUCCESS';
      return 'INFO';
    }

    // Parsea únicamente líneas de stats acumulativas emitidas por el CLI
    function tryParseProgress(text) {
      // Acumulativo tras cada sector: "STATS discovered=X processed=Y valid=Z errors=W"
      const s = text.match(/STATS discovered=(\d+)\s+processed=(\d+)\s+valid=(\d+)\s+errors=(\d+)/);
      if (s) {
        statDiscovered.textContent = s[1];
        statProcessed.textContent  = s[2];
        statValid.textContent      = s[3];
        statErrors.textContent     = s[4];
        updateCurrentHistoryRow(s[3], null);
        return;
      }
      // Resumen final: "discover=X processed=Y valid=Z ... errors=W"
      const f = text.match(/discover=(\d+)\s+processed=(\d+)\s+valid=(\d+).*errors=(\d+)/);
      if (f) {
        statDiscovered.textContent = f[1];
        statProcessed.textContent  = f[2];
        statValid.textContent      = f[3];
        statErrors.textContent     = f[4];
      }
    }

    function appendLine(text) {
      const div = document.createElement('div');
      div.className = 'line ' + levelOf(text);
      div.textContent = text;
      logEl.appendChild(div);
      lineNum++;
      lineCount.textContent = `${lineNum} línea${lineNum !== 1 ? 's' : ''}`;
      logEl.scrollTop = logEl.scrollHeight;
      tryParseProgress(text);
    }

    function setStatus(status) {
      badge.className = 'status-badge ' + status;
      badge.textContent =
        status === 'running' ? '● Ejecutando…' :
        status === 'done'    ? '✓ Completado'  :
        status === 'stopped' ? '■ Detenido'    :
        status === 'partial' ? '⚠ Parcial'     : '✗ Error';
      badge.style.display = 'inline-block';
      // Mostrar/ocultar botón Detener
      btnStop.style.display = status === 'running' ? 'inline-block' : 'none';
    }

    function resetStats() {
      [statDiscovered, statProcessed, statValid, statErrors].forEach(el => el.textContent = '–');
      statsBar.classList.add('visible');
    }

    const STATUS_LABELS = {
      done:    '<span style="color:#34d399">✓ Completado</span>',
      stopped: '<span style="color:#fdba74">■ Detenido</span>',
      partial: '<span style="color:#f59e0b">⚠ Parcial</span>',
      error:   '<span style="color:#f87171">✗ Error</span>',
      running: '<span style="color:#60a5fa">● Ejecutando…</span>',
    };

    function formatTime(isoString) {
      if (!isoString) return '—';
      return isoString.substring(11, 19);
    }

    function handleFolder(jobId) {
      if (isLocal) {
        fetch(`/open-folder/${jobId}`, { method: 'POST' });
      } else {
        window.location = `/download/${jobId}`;
      }
    }

    function makeHistoryRow(entry) {
      const tr = document.createElement('tr');
      tr.style.borderTop = '1px solid #2d3148';
      tr.dataset.jobId = entry.job_id;
      tr.addEventListener('mouseenter', () => tr.style.background = '#161926');
      tr.addEventListener('mouseleave', () => tr.style.background = '');

      const canAnalyze = (entry.valid_count ?? 0) > 0;

      const folderBtn = `<button onclick="event.stopPropagation(); handleFolder('${entry.job_id}')"
        title="Abrir carpeta / Descargar CSV"
        style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0 0.3rem; opacity:0.8;"
        onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">📁</button>`;

      const analyzeBtn = canAnalyze
        ? `<button onclick="event.stopPropagation(); window.location='/analyze/${entry.job_id}'"
            title="Analizar resultados"
            style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0 0.3rem; opacity:0.8;"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">🔍</button>`
        : `<button disabled title="Sin resultados para analizar"
            style="background:none; border:none; font-size:1.1rem; padding:0 0.3rem; opacity:0.3; cursor:not-allowed;">🔍</button>`;

      tr.innerHTML = `
        <td style="padding:0.45rem 0.5rem; color:#64748b">${formatTime(entry.started_at)}</td>
        <td style="padding:0.45rem 0.5rem">${entry.city}</td>
        <td style="padding:0.45rem 0.5rem">${entry.category}</td>
        <td class="status-cell" style="padding:0.45rem 0.5rem">${STATUS_LABELS[entry.status] || entry.status}</td>
        <td class="valid-cell" style="padding:0.45rem 0.5rem; text-align:right; color:#f8fafc; font-weight:600">${entry.valid_count ?? '—'}</td>
        <td style="padding:0.45rem 0.5rem; text-align:center; white-space:nowrap">${folderBtn}${analyzeBtn}</td>
      `;
      return tr;
    }

    async function loadHistory() {
      const res = await fetch('/history');
      const entries = await res.json();
      historyBody.innerHTML = '';
      for (const entry of entries) {
        historyBody.appendChild(makeHistoryRow(entry));
      }
      historyCard.style.display = entries.length > 0 ? 'block' : 'none';
    }

    function updateCurrentHistoryRow(validCount, status) {
      if (!currentHistoryRow) return;
      const validCell = currentHistoryRow.querySelector('.valid-cell');
      const statusCell = currentHistoryRow.querySelector('.status-cell');
      if (validCell) validCell.textContent = validCount;
      if (statusCell && status) statusCell.innerHTML = STATUS_LABELS[status] || status;
    }

    loadHistory();

    btnClear.addEventListener('click', () => {
      logEl.innerHTML = '';
      lineNum = 0;
      lineCount.textContent = '0 líneas';
    });

    btnStop.addEventListener('click', async () => {
      if (!currentJobId) return;
      btnStop.disabled = true;
      await fetch(`/stop/${currentJobId}`, { method: 'POST' });
      btnStop.disabled = false;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (es) { es.close(); es = null; }

      btnRun.disabled = true;
      btnDl.style.display = 'none';
      setStatus('running');
      resetStats();

      const data = new FormData(form);

      const res  = await fetch('/run', { method: 'POST', body: data });
      const { job_id, output } = await res.json();
      currentJobId = job_id;

      // Añadir fila al historial inmediatamente.
      // En modo comunidad el campo `city` está deshabilitado/vacío — usa el
      // nombre de la comunidad como label, igual que hace el backend.
      const labelForHistory = (data.get('comunidad') || data.get('city') || '').trim() || '—';
      const newEntry = {
        job_id,
        city: labelForHistory,
        category: data.get('category'),
        started_at: new Date().toISOString(),
        status: 'running',
        valid_count: 0,
        output,
      };
      currentHistoryRow = makeHistoryRow(newEntry);
      historyBody.prepend(currentHistoryRow);
      historyCard.style.display = 'block';

      es = new EventSource(`/stream/${job_id}`);
      es.onmessage = (ev) => appendLine(ev.data);

      es.addEventListener('done', (ev) => {
        es.close();
        const status = ev.data;
        setStatus(status);
        updateCurrentHistoryRow(statValid.textContent, status);
        btnRun.disabled = false;
        if (status === 'done' || status === 'stopped' || status === 'partial') {
          btnDl.style.display = 'inline-block';
          btnDl.onclick = () => { window.location = `/download/${job_id}`; };
        }
      });

      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return;
        appendLine('[error de conexión con el servidor]');
        es.close();
        btnRun.disabled = false;
        setStatus('error');
      };
    });
  </script>
</body>
</html>
